<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameCircle — ゲーム開発サークル</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-50: #EEEDFE;
      --purple-200: #AFA9EC;
      --purple-600: #534AB7;
      --purple-800: #3C3489;
      --teal-50: #E1F5EE;
      --teal-600: #0F6E56;
      --teal-800: #085041;
      --coral-50: #FAECE7;
      --coral-600: #993C1D;
      --coral-800: #712B13;
      --blue-50: #E6F1FB;
      --blue-600: #185FA5;
      --blue-800: #0C447C;
      --gray-100: #D3D1C7;
      --gray-600: #5F5E5A;
      --bg: #ffffff;
      --bg-secondary: #F7F7F5;
      --text: #1a1a18;
      --text-muted: #5F5E5A;
      --border: rgba(0,0,0,0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg-secondary: #232320;
        --text: #F1EFE8;
        --text-muted: #B4B2A9;
        --border: rgba(255,255,255,0.1);
        --purple-50: #26215C;
        --purple-600: #AFA9EC;
        --purple-800: #EEEDFE;
        --teal-50: #04342C;
        --teal-600: #5DCAA5;
        --teal-800: #E1F5EE;
        --coral-50: #4A1B0C;
        --coral-600: #F0997B;
        --coral-800: #FAECE7;
        --blue-50: #042C53;
        --blue-600: #85B7EB;
        --blue-800: #E6F1FB;
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem 0 0;
      gap: 0;
      z-index: 100;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .nav-logo img {
      width: 180px;
      height: auto;
      display: block;
      padding: 0;
      margin: 0;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── Hero ── */
    .hero {
      padding: 5rem 2rem 4rem;
      text-align: center;
      border-bottom: 0.5px solid var(--border);
      max-width: 700px;
      margin: 0 auto;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      border: 0.5px solid var(--border);
      border-radius: 99px;
      padding: 4px 14px;
      margin-bottom: 2rem;
    }
    .hero-note {
      font-size: 15px;
      color: #ffffff;
      margin-top: 1rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 500;
      line-height: 1.2;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
    }
    .hero h1 {
      color: #ffffff;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--purple-600);
    }
    .hero p {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 440px;
      margin: 0 auto 2.5rem;
    }
    .hero-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--purple-600); color: var(--purple-50); border: none; }
    .btn-ghost { background: transparent; color: var(--text); border: 0.5px solid var(--border); }

    /* ── Section wrapper ── */
    .section {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem;
      border-bottom: 0.5px solid var(--border);
    }
    .section-eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
    .section-title {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 2rem;
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 3.5rem;
    }
    .stat {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
    }
    .stat-num {
      font-size: 2.2rem;
      font-weight: 500;
      color: var(--purple-600);
      line-height: 1;
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── Members ── */
    .members {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .member-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
      margin: 0 auto 0.85rem;
    }
    .av-purple { background: var(--purple-50); color: var(--purple-800); }
    .av-teal   { background: var(--teal-50);   color: var(--teal-800); }
    .av-coral  { background: var(--coral-50);  color: var(--coral-800); }
    .av-blue   { background: var(--blue-50);   color: var(--blue-800); }
    .member-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .member-role { font-size: 12px; color: var(--text-muted); }

    /* ── Works ── */
    .works {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .work-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .work-card:hover { transform: translateY(-3px); }
    .work-thumb {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .work-thumb svg { opacity: 0.8; }
    .wt-purple { background: var(--purple-50); }
    .wt-teal   { background: var(--teal-50); }
    .wt-coral  { background: var(--coral-50); }
    .work-body { padding: 1rem 1.1rem 1.25rem; }
    .work-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .work-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
    .work-tag {
      display: inline-block;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 99px;
      background: var(--purple-50);
      color: var(--purple-800);
    }
    .work-tag.teal { background: var(--teal-50); color: var(--teal-800); }
    .work-tag.coral { background: var(--coral-50); color: var(--coral-800); }

    /* ── Footer ── */
    footer {
      padding: 2.5rem 2rem;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    footer a { color: var(--text-muted); text-decoration: underline; }

    @media (max-width: 600px) {
      nav { padding: 0.85rem 1.25rem; }
      .nav-links { gap: 1.25rem; }
      .hero { padding: 3.5rem 1.25rem 3rem; }
      .section { padding: 3rem 1.25rem; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-num { font-size: 1.6rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .work-card { transition: none; }
    }
  </style>
</head>
<body>

<!-- ── Navigation ── -->
<nav>
  <a class="nav-logo" href="https://dracobits.github.io/">
    <img src="logo.svg" alt="dracobits" />
  </a>
  <ul class="nav-links">
    <li><a href="#about">about</a></li>
    <li><a href="#members">members</a></li>
    <li><a href="#works">works</a></li>
  </ul>
</nav>

<!-- ── Hero ── -->
<div id="about">
  <div class="hero">
    <h1><em>DracoBits</em>のページにようこそ</h1>
    <p style="color:#ffffff;">DracoBitsはゲーム開発をはじめ、アプリ開発・システム開発などに取り組むサークルです。今後の活動をお楽しみにしてください。</p>
    <p class="hero-note">※現在準備中です。しばらくお待ちください。</p>
  </div>
</div>

</body>
</html>
